able once imported — nothing is write-once."},{icon:HS,title:"Show the why, not just the how",body:"Every block should answer 'why this matters' before 'how to type it'. Mental models age better than syntax."}],l5=[{id:"html",icon:Ro,label:"HTML",tagline:"Rich prose, structure, and embedding",what:"Standard HTML for prose, headings, figures, tables, lists, and links. Use it to shape the lesson's narrative alongside math and interactive blocks. The content is rendered directly in the page with full CSS support from the app's theme.",format:"Any valid HTML fragment — headings (`<h2>`–`<h6>`), paragraphs `<p>`, lists (`<ul>`/`<ol>`), tables (`<table>`), links (`<a>`), images (`<img>`), and inline elements (`<strong>`, `<em>`, `<code>`). Script tags are stripped for security.",example:`<h2>Introduction to Quadratic Functions</h2>
<p>A quadratic function is any function of the form <code>f(x) = ax² + bx + c</code> where <em>a ≠ 0</em>.</p>
<ul>
  <li><strong>Vertex form:</strong> f(x) = a(x − h)² + k</li>
  <li><strong>Roots:</strong> Use the quadratic formula</li>
</ul>`,pitfalls:"Script tags (`<script>`) are removed for security — use JSXGraph or MathBox for interactivity. Self-closing divs (`<div />`) don't work; always use `<div></div>`. Avoid `<style>` tags — use the app's theme system instead.",tips:"Use `<details>` and `<summary>` for expandable sections. Use `<figure>` + `<figcaption>` for annotated diagrams. Use `<code>` for inline code/math references and `<pre>` for code blocks. Tables can be styled with Tailwind classes via the `class` attribute."},{id:"katex",icon:jm,label:"KaTeX",tagline:"Beautiful, fast math typesetting",what:"KaTeX renders LaTeX-quality equations in the browser with crisp typography. It's the fastest math renderer available and produces accessible HTML output. Perfect for formulas, derivations, and mathematical notation.",format:"LaTeX math expressions. Display mode is auto-detected for expressions containing `int`, `sum`, or `\frac`. Use `,` for spacing, `	ext{}` for plain text inside math, and `\\` for line breaks in multi-line expressions.",example:"f(x) = \\frac{1}{\\sqrt{2\\pi\\sigma^2}} e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}",pitfalls:"In JSON (e.g., inside the lesson editor), backslashes must be double-escaped: `\\\\` becomes `\\` in the rendered output. The `\\begin{align}` environment is not supported — use `\\begin{aligned}` inside `$$...$$` instead. Always use `\\,` for spacing — spaces are collapsed in math mode.",tips:"Use `\\displaystyle` for inline fractions that should look like display style. The renderer auto-detects display mode for `\\int`, `\\sum`, and `\\frac`. Color works with `\\color{red}{text}`. Use `\\boxed{...}` to highlight important results."},{id:"mermaid",icon:wS,label:"Mermaid",tagline:"Diagrams from text",what:"Mermaid turns text into flowcharts, sequence diagrams, class diagrams, Gantt charts, and more. Perfect for visual explanations of processes, relationships, and workflows in mathematical contexts.",format:"Mermaid DSL — the first line declares the diagram type (`flowchart LR`, `sequenceDiagram`, `classDiagram`, `gantt`), followed by the diagram definition. See mermaid.js.org for the full syntax reference.",example:`flowchart LR
  A["Angle θ"] --> B["sin(θ)"]
  A --> C["cos(θ)"]
  B --> D["Wave"]
  C --> D
  D --> E["Periodic motion"]`,pitfalls:"Parentheses `()` inside node labels break the parser — always quote labels that contain them: `A[\"sin(θ)\" ]`. Commas in labels also need quoting. The theme auto-detects dark/light mode but you can force it with `%%{init: { 'theme': 'dark' }}%%` at the top.",tips:"Use `flowchart` instead of `graph` for better layout control. Subgraphs group related nodes. Click events work with `click A callback`. Use `A -.->|label| B` for dashed edges and `A ==> B` for thick edges."},{id:"jsxgraph",icon:pj,label:"JSXGraph",tagline:"Interactive geometry & sketches",what:"JSXGraph builds tactile geometric figures — points, lines, circles, polygons, sliders, and dynamic constructions that students can drag, resize, and explore. Runs in a sandboxed iframe for safety.",format:"JavaScript code. The variable `board` (a JXG.Board instance) is pre-created and ready to use. The board has bounding box `[-5, 5, 5, -5]` with axes visible. All JSXGraph API methods are available on `board.create()`.",example:`var p1 = board.create("point", [-2, 1], { name: "A", color: "#f472b6" });
var p2 = board.create("point", [3, -2], { name: "B", color: "#7dd3fc" });
var line = board.create("line", [p1, p2], { strokeColor: "#a78bfa" });
var mid = board.create("midpoint", [p1, p2], { name: "M", color: "#34d399" });
board.create("text", [0, 2, "Drag the points!"], { color: "#fff" });`,pitfalls:"The code runs in a sandboxed iframe — no access to `window`, `document`, or the parent page. You must reference the pre-created `board`; don't create your own. Sliders use `board.create('slider', ...)` with a position and value range.",tips:"Use `glider` points that stick to curves. Set `fixed: true` on static elements to prevent dragging. Use `functiongraph` for plotting math functions. Sliders are great for interactive parameter exploration — pair them with function graphs."},{id:"arquero",icon:T0,label:"Arquero",tagline:"Data tables & queries",what:"Arquero is a JavaScript library for data wrangling in the browser. Use it to filter, group, aggregate, and reshape tabular data. Results are printed as formatted tables directly in the lesson.",format:"JavaScript code using the `aq` namespace (pre-imported). The last expression should call `.print()` or another method that produces output. Errors are caught and displayed. Common methods: `from()`, `.filter()`, `.groupby()`, `.orderby()`, `.select()`, `.dedupe()`.",example:`const data = aq.from([
  { angle: 0, sin: 0, cos: 1 },
  { angle: 30, sin: 0.5, cos: 0.866 },
  { angle: 45, sin: 0.707, cos: 0.707 },
  { angle: 60, sin: 0.866, cos: 0.5 },
  { angle: 90, sin: 1, cos: 0 }
]);
data.select("angle", "sin").orderby("sin", "desc").print();`,pitfalls:"The `aq` variable is pre-defined — don't import or redefine it. Use `.print()` to output the table (not `console.log`). The script runs synchronously; async operations are not supported. Large datasets (>10k rows) may be slow.",tips:"Use `.select()` to narrow columns before printing wide tables. `.orderby()` sorts results. `.groupby().count()` gives quick frequency tables. For reproducible examples, embed the data inline with `aq.from([...])` instead of loading external files."},{id:"plotly",icon:iS,label:"Plotly",tagline:"Interactive charts",what:"Plotly produces rich, interactive 2D and 3D charts — scatter, line, bar, surface, contour — that respond to hover, zoom, and pan. Each chart has a mode bar for export as PNG.",format:"A JSON object with two required keys: `data` (array of trace objects) and `layout` (object with chart settings). Each trace has `type`, `x`, `y`, `mode`, and styling properties. See plotly.com for the full schema.",example:`{

ample:`trig_waves.mp4

<p>Trigonometry is the study of triangles and the periodic relationships between angles and side lengths. It began with right triangles — ratios like <strong>sine</strong>, <strong>cosine</strong>, and <strong>tangent</strong> — but quickly expanded to describe circles, oscillations, and waves.</p>
